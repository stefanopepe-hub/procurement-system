version: "3.9"

services:
  # ── Email testing locale (Mailhog) ──────────────────────────────────────────
  # Interfaccia web: http://localhost:8025
  # SMTP: mailhog:1025 (usare in SMTP_HOST per il backend)
  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - internal

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: procurement_db
      POSTGRES_USER: procurement
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procurement -d procurement_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgresql://procurement:${DB_PASSWORD:-changeme_in_production}@db:5432/procurement_db
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change_this_jwt_secret_in_production}
      SECRET_KEY: ${SECRET_KEY:-change_this_secret_in_production}
      DEBUG: "false"
      # Per test locale usare Mailhog (porta 1025, no TLS, no auth)
      # Per produzione sovrascrivere con le variabili SMTP reali
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_TLS: ${SMTP_TLS:-false}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@telethon.it}
      EMAIL_ALBO_FORNITORI: ${EMAIL_ALBO_FORNITORI:-albofornitori@telethon.it}
      UPLOAD_DIR: /app/uploads
      ALLOWED_ORIGINS: '["http://localhost:80","https://procurement.telethon.it"]'
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started
    networks:
      - internal
    expose:
      - "8000"

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "${PORT:-80}:80"
    environment:
      PORT: "80"
      BACKEND_URL: "http://backend:8000"
      VITE_API_URL: ""
    depends_on:
      - backend
    networks:
      - internal

volumes:
  postgres_data:
  uploads:

networks:
  internal:
    driver: bridge
