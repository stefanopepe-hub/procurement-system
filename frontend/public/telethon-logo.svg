<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 165">
  <!-- Two blue vertical bars (form the stem of the T in Telethon) -->
  <rect x="29" y="72" width="20" height="82" fill="#1a5fa8"/>
  <rect x="62" y="61" width="20" height="93" fill="#1a5fa8"/>

  <!-- Red star: cx=39, cy=52, R=24, r=9.6 -->
  <polygon fill="#d42027" stroke="white" stroke-width="1.2"
    points="39,28 44.6,44.2 61.8,44.6 48.1,55.0 53.1,71.4 39,61.6 24.9,71.4 29.9,55.0 16.2,44.6 33.4,44.2"/>
  <path fill="white" d="M39,37 L34.5,45 L37.5,45 L37.5,59 L40.5,59 L40.5,45 L43.5,45 Z"/>

  <!-- Blue star: cx=72, cy=38, R=27, r=10.8 -->
  <polygon fill="#1a5fa8" stroke="white" stroke-width="1.8"
    points="72,11 78.4,29.3 97.7,29.7 82.3,41.3 87.9,59.8 72,48.8 56.1,59.8 61.7,41.3 46.3,29.7 65.6,29.3"/>
  <path fill="white" d="M72,23 L67,32 L70,32 L70,47 L74,47 L74,32 L77,32 Z"/>

  <!-- Green star: cx=100, cy=52, R=21, r=8.4 -->
  <polygon fill="#2d8a3e" stroke="white" stroke-width="1"
    points="100,31 104.9,45.2 120.0,45.5 108.0,54.6 112.3,69.0 100,60.4 87.7,69.0 92.0,54.6 80.0,45.5 95.1,45.2"/>
  <path fill="white" d="M100,40 L96,48 L98.5,48 L98.5,60 L101.5,60 L101.5,48 L104,48 Z"/>

  <!-- FONDAZIONE label (top right, small caps) -->
  <text x="127" y="49"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="700"
        font-size="21"
        fill="#1a5fa8"
        letter-spacing="2">FONDAZIONE</text>

  <!-- elethon — large bold italic (T is formed by the bars + stars above) -->
  <text x="83" y="152"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="900"
        font-style="italic"
        font-size="88"
        fill="#1a5fa8">elethon</text>
</svg>
