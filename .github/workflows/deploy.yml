name: Deploy su Railway

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Installa Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy Backend su Railway
        run: railway up --service ${{ secrets.RAILWAY_BACKEND_SERVICE }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Installa Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy Frontend su Railway
        run: railway up --service ${{ secrets.RAILWAY_FRONTEND_SERVICE }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
