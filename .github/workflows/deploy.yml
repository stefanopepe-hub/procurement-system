name: Deploy su Railway

# Si attiva automaticamente ogni volta che carichi modifiche su GitHub (branch main)
on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Controlla che il backend funzioni
  # ─────────────────────────────────────────────
  test-backend:
    name: Verifica Backend
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installa dipendenze backend
        working-directory: ./backend
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Controlla sintassi Python (linting base)
        working-directory: ./backend
        run: python -m py_compile main.py && echo "✅ Backend OK"

  # ─────────────────────────────────────────────
  # JOB 2: Controlla che il frontend si compili
  # ─────────────────────────────────────────────
  test-frontend:
    name: Verifica Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Installa dipendenze frontend
        working-directory: ./frontend
        run: npm ci

      - name: Compila il frontend
        working-directory: ./frontend
        run: npm run build
        env:
          # Usa una URL fittizia per la build di verifica
          VITE_API_URL: https://placeholder.up.railway.app

  # ─────────────────────────────────────────────
  # JOB 3: Deploy su Railway (solo se i test passano)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy su Railway
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]  # Aspetta che entrambi i test passino
    steps:
      - name: Scarica il codice
        uses: actions/checkout@v4

      - name: Installa Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend su Railway
        run: railway up --service ${{ secrets.RAILWAY_BACKEND_SERVICE }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deploy Frontend su Railway
        run: railway up --service ${{ secrets.RAILWAY_FRONTEND_SERVICE }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Notifica successo
        if: success()
        run: echo "🚀 Deploy completato con successo!"

      - name: Notifica fallimento
        if: failure()
        run: echo "❌ Deploy fallito — controlla i log sopra"
